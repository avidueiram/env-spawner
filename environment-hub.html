<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ENVIRONMENT_NAME}} · environment hub</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0f1115;
      --surface: #1b1c1d;
      --surface-high: #242628;
      --surface-higher: #2c2f31;
      --text: #e3e3e3;
      --muted: #c4c7c5;
      --border: #444746;
      --primary: #a8c7fa;
      --primary-strong: #8ab4f8;
      --ok: #81c995;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 1rem;
      font-family: 'Google Sans Text', 'Google Sans', Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 12% -24%, #1a2233 0%, transparent 42%), var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: min(100%, 980px);
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: clamp(1rem, 2vw, 1.6rem);
    }

    .brandline {
      height: 4px;
      width: 212px;
      border-radius: 999px;
      background: linear-gradient(90deg, #4285f4 0 25%, #34a853 25% 50%, #fbbc05 50% 75%, #ea4335 75% 100%);
      margin-bottom: 1rem;
      opacity: 0.92;
    }

    .top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem 1rem;
      margin-bottom: 1.2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.74rem;
      font-size: 0.73rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface-high);
    }

    .dot {
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(129, 201, 149, 0.2);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.5vw, 1.52rem);
      font-weight: 500;
      line-height: 1.2;
    }

    .sub {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stamp {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-high);
      padding: 0.58rem 0.75rem;
      min-width: 180px;
      text-align: right;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .stamp b {
      display: block;
      margin-top: 0.18rem;
      color: var(--text);
      letter-spacing: 0.02em;
      font-size: 0.85rem;
    }

    .grid {
      display: grid;
      gap: 0.8rem;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .card {
      border-radius: 20px;
      padding: 1rem;
      border: 1px solid var(--border);
      background: var(--surface-high);
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .card h2 {
      margin: 0;
      font-size: 0.98rem;
      letter-spacing: 0.01em;
      font-weight: 600;
    }

    .card ul {
      margin: 0.72rem 0 0;
      padding: 0;
      list-style: none;
    }

    .card a {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      text-decoration: none;
      border-radius: 999px;
      padding: 0.35rem 0.74rem;
      font: 600 0.82rem/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--primary);
      background: var(--surface-higher);
      border: 1px solid var(--border);
      transition: border-color 140ms ease, transform 140ms ease;
    }

    .card a:hover {
      transform: translateY(-1px);
      border-color: var(--primary-strong);
    }

    .meta {
      margin-top: 0.55rem;
      font-size: 0.79rem;
      color: var(--muted);
    }

    .muted {
      margin-top: 1.25rem;
      padding-top: 0.8rem;
      border-top: 1px dashed #3f4960;
      font-size: 0.83rem;
      color: var(--muted);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #202124;
        --muted: #5f6368;
        --border: #dadce0;
        --primary: #1a73e8;
        --primary-strong: #1967d2;
        --ok: #188038;
        --surface-high: #ffffff;
        --surface-higher: #f1f3f4;
        --shadow: 0 1px 6px rgba(60, 64, 67, 0.2);
      }

      body {
        background: radial-gradient(circle at 12% -24%, #e8f0fe 0%, transparent 42%), var(--bg);
      }

      .badge,
      .stamp,
      .card {
        background: #ffffff;
      }

      .brandline {
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 0.8rem;
      }

      .shell {
        border-radius: 18px;
      }

      .stamp {
        min-width: 100%;
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="top">
      <div>
        <h1>Environment hub</h1>
        <p class="sub">Host to container port map for this compose project.</p>
      </div>
      <div class="stamp">
        workspace
        <b>{{ENVIRONMENT_NAME}}</b>
      </div>
    </section>

    <div class="grid">
      <article class="card app">
        <h2>app</h2>
        <ul>
          <li><a href="http://localhost:{{APP_PORT}}" target="_blank" rel="noreferrer">{{APP_PORT}}</a></li>
        </ul>
      </article>
      <article class="card server">
        <h2>server</h2>
        <ul>
          <li><a href="http://localhost:{{SERVER_PORT}}" target="_blank" rel="noreferrer">{{SERVER_PORT}}</a></li>
        </ul>
      </article>
      <article class="card database">
        <h2>database</h2>
        <ul>
          <li><a href="https://local.drizzle.studio/?port={{DATABASE_STUDIO}}" target="_blank" rel="noreferrer">{{DATABASE_STUDIO}}</a></li>
        </ul>
      </article>
      <article class="card firebase">
        <h2>firebase</h2>
        <ul>
          <li><a href="http://localhost:{{FIREBASE_UI_PORT}}" target="_blank" rel="noreferrer">{{FIREBASE_UI_PORT}}</a></li>
        </ul>
      </article>
    </div>
  </main>
</body>

</html>
