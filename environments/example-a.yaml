services:
  env-spawner:
    container_name: env-spawner
    ports:
      # port forwarding from host to container
      # - "host-port:container-port"
      - "4201:4200"
      - "8101:8100"
      - "3001:3000"
    volumes:
      # volume mapping from host to container
      # - "host-path:container-path"
      - /example/host/path/my-project-a:/workspace/my-project
    working_dir: /workspace
